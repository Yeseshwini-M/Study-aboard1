<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <defs>
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="37" height="80"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="37" y="0" width="37" height="80"/>
    </clipPath>
  </defs>

  <!-- ── Icon group ── -->
  <g transform="translate(10, 5)">

    <!-- Circle - left half navy -->
    <circle cx="37" cy="45" r="30" fill="#1a2744" clip-path="url(#leftHalf)"/>
    <!-- Circle - right half red -->
    <circle cx="37" cy="45" r="30" fill="#c0392b" clip-path="url(#rightHalf)"/>

    <!-- Letters E and W -->
    <text x="22" y="54" font-family="'Arial Black', 'Helvetica', sans-serif" font-weight="900" font-size="24" fill="#ffffff" text-anchor="middle">E</text>
    <text x="52" y="54" font-family="'Arial Black', 'Helvetica', sans-serif" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">W</text>

    <!-- Center divider -->
    <line x1="37" y1="15" x2="37" y2="75" stroke="#ffffff" stroke-width="1.2"/>

    <!-- ── Graduation cap ── -->
    <!-- Cap board (diamond shape) -->
    <polygon points="37,4 60,14 37,22 14,14" fill="#1a2744"/>
    <!-- Cap top highlight -->
    <polygon points="37,5 58,14 37,21 16,14" fill="#243056"/>

    <!-- Cap button on top -->
    <circle cx="37" cy="13" r="1.8" fill="#1a2744"/>

    <!-- Tassel string from right corner -->
    <path d="M58,14 Q62,18 61,28" fill="none" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Tassel bottom tassels -->
    <line x1="60" y1="28" x2="59" y2="33" stroke="#c0392b" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="61" y1="28" x2="61" y2="33" stroke="#c0392b" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="62" y1="28" x2="63" y2="33" stroke="#c0392b" stroke-width="1.3" stroke-linecap="round"/>

  </g>

  <!-- ── Text: EDMISSIONS ── -->
  <text x="95" y="38" font-family="'Arial Black', 'Impact', 'Helvetica', sans-serif" font-weight="900" font-size="25" fill="#1a2744" letter-spacing="1.5">EDMISSIONS</text>

  <!-- ── Text: WORLD ── -->
  <text x="95" y="66" font-family="'Arial Black', 'Impact', 'Helvetica', sans-serif" font-weight="900" font-size="25" fill="#c0392b" letter-spacing="3">WORLD</text>

  <!-- ── Tagline ── -->
  <text x="96" y="82" font-family="'Georgia', 'Times New Roman', serif" font-style="italic" font-size="11" fill="#666666" letter-spacing="0.5">way to global education..!</text>

</svg>
