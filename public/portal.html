<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edmissions World - Study Abroad Management</title>
  <meta name="description" content="Edmissions World - Your gateway to global education.">
  <link rel="stylesheet" href="/css/global.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', 'Inter', sans-serif;
      min-height: 100vh;
      background-color: #e3e9f0;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(192, 57, 43, 0.09) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(22, 34, 56, 0.09) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.45) 0%, transparent 70%),
        linear-gradient(rgba(22, 34, 56, 0.02) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(22, 34, 56, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 100% 100%, 36px 36px, 36px 36px;
      color: #2c2825;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow-x: hidden;
    }

    .landing-wrapper {
      width: 100%;
      max-width: 900px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand-header {
      width: 100%;
      max-width: 720px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
      position: relative;
    }

    .brand-header::before {
      content: '';
      position: absolute;
      width: 360px;
      height: 140px;
      background: radial-gradient(circle, rgba(192, 57, 43, 0.06) 0%, rgba(22, 34, 56, 0.05) 60%, transparent 100%);
      z-index: -1;
      filter: blur(20px);
    }

    .brand-logo {
      width: 100%;
      max-height: 250px;
      object-fit: contain;
      display: block;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .brand-logo:hover { transform: scale(1.03); }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.35rem;
      color: #c0392b;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #5a5550;
      line-height: 1.7;
      max-width: 600px;
      margin: 0 auto 36px;
    }

    .divider {
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, #162238 0%, #162238 50%, #c0392b 50%, #c0392b 100%);
      border-radius: 4px;
      margin-bottom: 44px;
    }

    .landing-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      width: 100%;
      margin-bottom: 54px;
    }

    .landing-card {
      background: #ffffff;
      border: 1px solid #e4e2db;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.015);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .card-terracotta { border-top: 4px solid #c0392b; }
    .card-terracotta:hover {
      border-color: #c0392b;
      box-shadow: 0 12px 36px rgba(192, 57, 43, 0.08);
      transform: translateY(-5px);
    }

    .card-navy { border-top: 4px solid #162238; }
    .card-navy:hover {
      border-color: #162238;
      box-shadow: 0 12px 36px rgba(22, 34, 56, 0.08);
      transform: translateY(-5px);
    }

    .card-icon {
      font-size: 2.3rem;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
      transition: transform 0.3s ease;
    }

    .landing-card:hover .card-icon { transform: scale(1.1) rotate(3deg); }

    .bg-terracotta { background: #fdf2f0; border: 1px solid #f9d3cc; color: #c0392b; }
    .bg-navy { background: #eef2f7; border: 1px solid #d2deeb; color: #162238; }

    .landing-card h3 { font-size: 1.3rem; font-weight: 700; color: #2c2825; }
    .landing-card p { font-size: 0.92rem; color: #6a635d; line-height: 1.6; }

    .card-btn {
      margin-top: 10px;
      padding: 11px 28px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      border-radius: 10px;
      transition: all 0.22s ease;
      text-decoration: none;
      display: inline-block;
      letter-spacing: 0.2px;
    }

    .btn-terracotta { background-color: #c0392b; color: #ffffff; box-shadow: 0 4px 12px rgba(192, 57, 43, 0.18); }
    .btn-terracotta:hover { background-color: #a93226; box-shadow: 0 6px 16px rgba(192, 57, 43, 0.3); }

    .btn-navy { background-color: #162238; color: #ffffff; box-shadow: 0 4px 12px rgba(22, 34, 56, 0.18); }
    .btn-navy:hover { background-color: #0f1828; box-shadow: 0 6px 16px rgba(22, 34, 56, 0.3); }

    .footer-note {
      color: #8c837b;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      border-top: 1px solid #e4e2db;
      padding-top: 24px;
      width: 100%;
      max-width: 400px;
    }

    @media (max-width: 640px) {
      .landing-cards { grid-template-columns: 1fr; gap: 24px; }
      .brand-header { max-width: 95%; }
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function HomePage() {
      return (
        <div className="landing-wrapper">
          <header className="brand-header">
            <img src="/images/logo.png" alt="Edmissions World Logo" className="brand-logo" />
          </header>

          <p className="tagline">Way to Global Education</p>
          <p className="subtitle">
            Submit a study abroad walk-in inquiry or access the administration system using our unified student management portal.
          </p>

          <div className="divider"></div>

          <div className="landing-cards">
            <a href="/" className="landing-card card-terracotta">
              <div className="card-icon bg-terracotta">📋</div>
              <h3>Student Walk-In Form</h3>
              <p>Register new student details, academic history, and target study locations.</p>
              <span className="card-btn btn-terracotta">Open Form &rarr;</span>
            </a>

            <a href="/admin-login.html" className="landing-card card-navy">
              <div className="card-icon bg-navy">🔐</div>
              <h3>Admin Dashboard</h3>
              <p>Manage submissions, generate reports, search registrations, and export to Excel/CSV.</p>
              <span className="card-btn btn-navy">Admin Login &rarr;</span>
            </a>
          </div>

          <p className="footer-note">&copy; 2026 Edmissions World &nbsp;&middot;&nbsp; Way to Global Education</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HomePage />);
  </script>
</body>
</html>
